server.port=8080

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.server.webflux.routes[1].id=document-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://DOCUMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/documents/**

spring.cloud.gateway.server.webflux.routes[2].id=task-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://TASK-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/tasks/**